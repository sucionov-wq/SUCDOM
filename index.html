<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SUCDOM - OSINT Domain Tool</title>
    <style>
        :root {
            --bg: #0a0a0f;
            --card: #13131a;
            --border: #1e1e2e;
            --text: #cdd6f4;
            --accent: #89b4fa;
            --green: #a6e3a1;
            --red: #f38ba8;
            --yellow: #f9e2af;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: var(--bg);
            color: var(--text);
            font-family: 'JetBrains Mono', 'Fira Code', monospace;
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
        }

        header {
            text-align: center;
            margin-bottom: 30px;
        }

        .logo {
            font-size: 3rem;
            font-weight: 900;
            background: linear-gradient(135deg, var(--accent), #cba6f7);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            letter-spacing: 4px;
        }

        .subtitle {
            color: #6c7086;
            margin-top: 5px;
        }

        .search-box {
            display: flex;
            gap: 10px;
            margin-bottom: 30px;
        }

        input {
            flex: 1;
            padding: 16px 20px;
            background: var(--card);
            border: 2px solid var(--border);
            border-radius: 12px;
            color: var(--text);
            font-size: 1rem;
            font-family: inherit;
            transition: border-color 0.3s;
        }

        input:focus {
            outline: none;
            border-color: var(--accent);
        }

        button {
            padding: 16px 30px;
            background: var(--accent);
            color: var(--bg);
            border: none;
            border-radius: 12px;
            cursor: pointer;
            font-weight: 700;
            font-family: inherit;
            font-size: 1rem;
            transition: transform 0.2s, opacity 0.2s;
        }

        button:hover {
            transform: translateY(-2px);
            opacity: 0.9;
        }

        button:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: none;
        }

        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(350px, 1fr));
            gap: 20px;
        }

        .card {
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: 16px;
            padding: 24px;
        }

        .card h2 {
            font-size: 0.85rem;
            text-transform: uppercase;
            letter-spacing: 2px;
            color: #6c7086;
            margin-bottom: 16px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .card h2 .icon {
            font-size: 1.2rem;
        }

        .result-row {
            display: flex;
            justify-content: space-between;
            padding: 10px 0;
            border-bottom: 1px solid var(--border);
            font-size: 0.9rem;
        }

        .result-row:last-child {
            border-bottom: none;
        }

        .label {
            color: #6c7086;
        }

        .value {
            font-weight: 600;
            word-break: break-all;
            text-align: right;
        }

        .status-badge {
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 0.8rem;
            font-weight: 700;
        }

        .status-up { background: rgba(166, 227, 161, 0.15); color: var(--green); }
        .status-down { background: rgba(243, 139, 168, 0.15); color: var(--red); }
        .status-warn { background: rgba(249, 226, 175, 0.15); color: var(--yellow); }

        .subdomain-list {
            max-height: 300px;
            overflow-y: auto;
        }

        .subdomain-item {
            padding: 8px 0;
            border-bottom: 1px solid var(--border);
            font-size: 0.85rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .dns-records {
            font-size: 0.85rem;
        }

        .record-type {
            color: var(--accent);
            font-weight: 700;
            min-width: 50px;
            display: inline-block;
        }

        .spinner {
            display: inline-block;
            width: 16px;
            height: 16px;
            border: 2px solid var(--border);
            border-top-color: var(--accent);
            border-radius: 50%;
            animation: spin 0.6s linear infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .error {
            color: var(--red);
            font-size: 0.85rem;
            padding: 10px 0;
        }

        .tabs {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
            flex-wrap: wrap;
        }

        .tab-btn {
            padding: 8px 16px;
            background: transparent;
            border: 1px solid var(--border);
            border-radius: 8px;
            color: var(--text);
            cursor: pointer;
            font-family: inherit;
            font-size: 0.85rem;
            transition: all 0.2s;
        }

        .tab-btn.active {
            background: var(--accent);
            color: var(--bg);
            border-color: var(--accent);
        }

        .hidden {
            display: none;
        }

        footer {
            text-align: center;
            margin-top: 40px;
            color: #6c7086;
            font-size: 0.8rem;
        }

        a {
            color: var(--accent);
            text-decoration: none;
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <div class="logo">SUCDOM</div>
            <p class="subtitle">OSINT Domain Intelligence Tool</p>
        </header>

        <div class="search-box">
            <input 
                type="text" 
                id="domainInput" 
                placeholder="Введите домен (например, example.com)"
                autocomplete="off"
            >
            <button id="scanBtn">🔍 Сканировать</button>
        </div>

        <div class="tabs">
            <button class="tab-btn active" data-tab="overview">Обзор</button>
            <button class="tab-btn" data-tab="dns">DNS записи</button>
            <button class="tab-btn" data-tab="subdomains">Поддомены</button>
            <button class="tab-btn" data-tab="ports">Порты</button>
            <button class="tab-btn" data-tab="tech">Технологии</button>
        </div>

        <div id="loading" class="hidden" style="text-align: center; padding: 40px;">
            <span class="spinner"></span> Сканируем...
        </div>

        <div id="results" class="grid hidden">
            <!-- Обзор -->
            <div class="card tab-content" id="tab-overview">
                <h2><span class="icon">🌐</span> Информация о домене</h2>
                <div id="overviewContent"></div>
            </div>

            <div class="card tab-content" id="tab-whois">
                <h2><span class="icon">📋</span> WHOIS (даты)</h2>
                <div id="whoisContent"></div>
            </div>

            <!-- DNS -->
            <div class="card tab-content hidden" id="tab-dns">
                <h2><span class="icon">📡</span> DNS записи</h2>
                <div id="dnsContent" class="dns-records"></div>
            </div>

            <!-- Поддомены -->
            <div class="card tab-content hidden" id="tab-subdomains">
                <h2><span class="icon">🔗</span> Поддомены</h2>
                <div id="subdomainsContent" class="subdomain-list"></div>
            </div>

            <!-- Порты -->
            <div class="card tab-content hidden" id="tab-ports">
                <h2><span class="icon">🚪</span> Открытые порты</h2>
                <div id="portsContent"></div>
            </div>

            <!-- Технологии -->
            <div class="card tab-content hidden" id="tab-tech">
                <h2><span class="icon">⚙️</span> Технологии</h2>
                <div id="techContent"></div>
            </div>
        </div>

        <footer>
            SUCDOM v1.0 | Использует публичные API | 
            <a href="https://github.com" target="_blank">GitHub</a>
        </footer>
    </div>

    <script>
        // DOM элементы
        const domainInput = document.getElementById('domainInput');
        const scanBtn = document.getElementById('scanBtn');
        const loading = document.getElementById('loading');
        const results = document.getElementById('results');
        const tabBtns = document.querySelectorAll('.tab-btn');
        const tabContents = document.querySelectorAll('.tab-content');

        // Переключение вкладок
        tabBtns.forEach(btn => {
            btn.addEventListener('click', () => {
                const tab = btn.dataset.tab;
                
                tabBtns.forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
                
                tabContents.forEach(c => {
                    c.classList.add('hidden');
                    if (c.id === `tab-${tab}` || (tab === 'overview' && (c.id === 'tab-overview' || c.id === 'tab-whois'))) {
                        c.classList.remove('hidden');
                    }
                });

                // Показываем whois карточку только на overview
                if (tab === 'overview') {
                    document.getElementById('tab-whois').classList.remove('hidden');
                } else {
                    document.getElementById('tab-whois').classList.add('hidden');
                }
            });
        });

        // Обработчик сканирования
        scanBtn.addEventListener('click', scanDomain);
        domainInput.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') scanDomain();
        });

        // Очистка домена
        function cleanDomain(domain) {
            return domain.replace(/^(https?:\/\/)?(www\.)?/, '').replace(/\/.*$/, '').toLowerCase().trim();
        }

        // Основная функция сканирования
        async function scanDomain() {
            const rawDomain = domainInput.value.trim();
            if (!rawDomain) return;

            const domain = cleanDomain(rawDomain);
            domainInput.value = domain;

            // Показываем загрузку
            loading.classList.remove('hidden');
            results.classList.add('hidden');
            scanBtn.disabled = true;

            try {
                // Запускаем все проверки параллельно
                await Promise.allSettled([
                    fetchDomainInfo(domain),
                    fetchWhois(domain),
                    fetchDNS(domain),
                    fetchSubdomains(domain),
                    fetchPorts(domain),
                    fetchTechnologies(domain),
                ]);

                results.classList.remove('hidden');
                // По умолчанию показываем overview
                document.querySelector('[data-tab="overview"]').click();
            } catch (error) {
                console.error('Scan error:', error);
            } finally {
                loading.classList.add('hidden');
                scanBtn.disabled = false;
            }
        }

        // 1. Информация о домене (через DNS-over-HTTPS)
        async function fetchDomainInfo(domain) {
            const container = document.getElementById('overviewContent');
            try {
                // Проверка через DNS
                const dnsRes = await fetch(`https://dns.google/resolve?name=${domain}&type=A`);
                const dnsData = await dnsRes.json();
                
                const hasA = dnsData.Answer?.some(r => r.type === 1);
                const ip = dnsData.Answer?.find(r => r.type === 1)?.data || 'N/A';

                // Проверка HTTP статуса через CORS-прокси
                let httpStatus = 'Неизвестно';
                try {
                    const httpRes = await fetch(`https://api.allorigins.win/raw?url=${encodeURIComponent('http://' + domain)}`, {
                        signal: AbortSignal.timeout(5000)
                    });
                    httpStatus = `${httpRes.status} ${httpRes.statusText}`;
                } catch {
                    httpStatus = 'Недоступен';
                }

                container.innerHTML = `
                    <div class="result-row">
                        <span class="label">Домен</span>
                        <span class="value">${domain}</span>
                    </div>
                    <div class="result-row">
                        <span class="label">IP адрес</span>
                        <span class="value">${ip}</span>
                    </div>
                    <div class="result-row">
                        <span class="label">DNS статус</span>
                        <span class="value">
                            <span class="status-badge ${hasA ? 'status-up' : 'status-down'}">
                                ${hasA ? 'Записи найдены' : 'Нет A записей'}
                            </span>
                        </span>
                    </div>
                    <div class="result-row">
                        <span class="label">HTTP статус</span>
                        <span class="value">${httpStatus}</span>
                    </div>
                `;
            } catch (error) {
                container.innerHTML = `<div class="error">Ошибка: ${error.message}</div>`;
            }
        }

        // 2. WHOIS информация
        async function fetchWhois(domain) {
            const container = document.getElementById('whoisContent');
            try {
                const res = await fetch(`https://api.allorigins.win/raw?url=${encodeURIComponent('https://www.whois.com/whois/' + domain)}`);
                const html = await res.text();
                
                // Парсим даты из HTML
                const createdMatch = html.match(/Creation Date[:\s]*([^\n<]+)/i);
                const expiresMatch = html.match(/Registry Expiry Date[:\s]*([^\n<]+)/i);
                const updatedMatch = html.match(/Updated Date[:\s]*([^\n<]+)/i);
                const registrarMatch = html.match(/Registrar[:\s]*([^\n<]+)/i);

                container.innerHTML = `
                    <div class="result-row">
                        <span class="label">Создан</span>
                        <span class="value">${createdMatch ? createdMatch[1].trim() : 'N/A'}</span>
                    </div>
                    <div class="result-row">
                        <span class="label">Истекает</span>
                        <span class="value">${expiresMatch ? expiresMatch[1].trim() : 'N/A'}</span>
                    </div>
                    <div class="result-row">
                        <span class="label">Обновлён</span>
                        <span class="value">${updatedMatch ? updatedMatch[1].trim() : 'N/A'}</span>
                    </div>
                    <div class="result-row">
                        <span class="label">Регистратор</span>
                        <span class="value">${registrarMatch ? registrarMatch[1].trim() : 'N/A'}</span>
                    </div>
                `;
            } catch (error) {
                container.innerHTML = `<div class="error">WHOIS недоступен</div>`;
            }
        }

        // 3. DNS записи
        async function fetchDNS(domain) {
            const container = document.getElementById('dnsContent');
            const types = ['A', 'AAAA', 'MX', 'NS', 'TXT', 'CNAME', 'SOA'];
            let html = '';

            for (const type of types) {
                try {
                    const res = await fetch(`https://dns.google/resolve?name=${domain}&type=${type}`);
                    const data = await res.json();
                    
                    if (data.Answer) {
                        data.Answer.forEach(record => {
                            html += `
                                <div class="result-row">
                                    <span class="record-type">${type}</span>
                                    <span class="value">${record.data}</span>
                                </div>
                            `;
                        });
                    }
                } catch {
                    // Пропускаем ошибки отдельных типов
                }
            }

            container.innerHTML = html || '<div class="error">DNS записи не найдены</div>';
        }

        // 4. Поддомены (через crt.sh)
        async function fetchSubdomains(domain) {
            const container = document.getElementById('subdomainsContent');
            try {
                const res = await fetch(`https://crt.sh/?q=%.${domain}&output=json`);
                const data = await res.json();
                
                // Извлекаем уникальные поддомены
                const subdomains = new Set();
                data.forEach(entry => {
                    const name = entry.name_value?.toLowerCase();
                    if (name && name.includes(domain)) {
                        // Разделяем многострочные записи
                        name.split('\n').forEach(n => {
                            const cleaned = n.trim().replace(/^\*\./, '');
                            if (cleaned && cleaned !== domain && cleaned.endsWith(domain)) {
                                subdomains.add(cleaned);
                            }
                        });
                    }
                });

                const sorted = [...subdomains].sort();
                container.innerHTML = sorted.slice(0, 50).map(sub => `
                    <div class="subdomain-item">
                        <span>${sub}</span>
                        <span class="status-badge status-warn">crt.sh</span>
                    </div>
                `).join('') || '<div class="error">Поддомены не найдены</div>';

                if (sorted.length > 50) {
                    container.innerHTML += `<div style="color: #6c7086; text-align: center; padding: 10px;">Показано 50 из ${sorted.length}</div>`;
                }
            } catch (error) {
                container.innerHTML = '<div class="error">Не удалось получить поддомены</div>';
            }
        }

        // 5. Порты (эмуляция — в реальности нужен бэкенд)
        async function fetchPorts(domain) {
            const container = document.getElementById('portsContent');
            const commonPorts = [
                { port: 80, service: 'HTTP' },
                { port: 443, service: 'HTTPS' },
                { port: 22, service: 'SSH' },
                { port: 21, service: 'FTP' },
                { port: 25, service: 'SMTP' },
                { port: 3306, service: 'MySQL' },
                { port: 8080, service: 'HTTP-Alt' },
                { port: 8443, service: 'HTTPS-Alt' },
            ];

            // Проверяем через попытку fetch (только HTTP/HTTPS порты)
                        let html = '<div style="color: #6c7086; font-size: 0.85rem; margin-bottom: 10px;">⚠️ Полное сканирование портов требует бэкенд. Показаны только HTTP-порты.</div>';
            
            for (const { port } of commonPorts) {
                try {
                    const protocol = port === 443 || port === 8443 ? 'https' : 'http';
                    const res = await fetch(`https://api.allorigins.win/raw?url=${encodeURIComponent(`${protocol}://${domain}:${port}`)}`, {
                        signal: AbortSignal.timeout(3000)
                    });
                    html += `
                        <div class="result-row">
                            <span class="label">Порт ${port}</span>
                            <span class="value">
                                <span class="status-badge status-up">Открыт</span>
                            </span>
                        </div>
                    `;
                } catch {
                    html += `
                        <div class="result-row">
                            <span class="label">Порт ${port}</span>
                            <span class="value">
                                <span class="status-badge status-down">Закрыт/Таймаут</span>
                            </span>
                        </div>
                    `;
                }
            }
            container.innerHTML = html;
        }

        // 6. Технологии (через Wappalyzer-подобный анализ заголовков)
        async function fetchTechnologies(domain) {
            const container = document.getElementById('techContent');
            try {
                const res = await fetch(`https://api.allorigins.win/raw?url=${encodeURIComponent('https://' + domain)}`, {
                    signal: AbortSignal.timeout(8000)
                });
                
                const headers = {};
                res.headers.forEach((value, key) => {
                    headers[key.toLowerCase()] = value;
                });

                const tech = [];

                if (headers['server']) {
                    tech.push({ name: 'Веб-сервер', value: headers['server'] });
                }
                if (headers['x-powered-by']) {
                    tech.push({ name: 'Powered by', value: headers['x-powered-by'] });
                }
                if (headers['x-generator']) {
                    tech.push({ name: 'Генератор', value: headers['x-generator'] });
                }
                if (headers['content-security-policy']) {
                    tech.push({ name: 'CSP', value: 'Присутствует' });
                }
                if (headers['strict-transport-security']) {
                    tech.push({ name: 'HSTS', value: 'Включён' });
                }
                if (headers['x-frame-options']) {
                    tech.push({ name: 'X-Frame-Options', value: headers['x-frame-options'] });
                }
                if (headers['cf-ray']) {
                    tech.push({ name: 'CDN', value: 'Cloudflare' });
                }

                container.innerHTML = tech.length > 0 
                    ? tech.map(t => `
                        <div class="result-row">
                            <span class="label">${t.name}</span>
                            <span class="value">${t.value}</span>
                        </div>
                    `).join('')
                    : '<div class="error">Технологии не определены</div>';

            } catch (error) {
                container.innerHTML = '<div class="error">Не удалось определить технологии</div>';
            }
        }

        // Сохранение результатов
        function exportResults() {
            const domain = cleanDomain(domainInput.value);
            if (!domain) return;
            
            const results = {
                domain: domain,
                timestamp: new Date().toISOString(),
                overview: document.getElementById('overviewContent')?.innerText,
                whois: document.getElementById('whoisContent')?.innerText,
                dns: document.getElementById('dnsContent')?.innerText,
                subdomains: document.getElementById('subdomainsContent')?.innerText,
                ports: document.getElementById('portsContent')?.innerText,
                tech: document.getElementById('techContent')?.innerText,
            };
            
            const blob = new Blob([JSON.stringify(results, null, 2)], { type: 'application/json' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = `sucdom_${domain}_${Date.now()}.json`;
            a.click();
            URL.revokeObjectURL(url);
        }

        // История сканирований
        let scanHistory = JSON.parse(localStorage.getItem('sucdom_history') || '[]');
        
        function addToHistory(domain) {
            scanHistory.unshift({
                domain: domain,
                timestamp: new Date().toISOString()
            });
            if (scanHistory.length > 20) scanHistory.pop();
            localStorage.setItem('sucdom_history', JSON.stringify(scanHistory));
            renderHistory();
        }

        function renderHistory() {
            const historyContainer = document.getElementById('historyList');
            if (!historyContainer) return;
            
            historyContainer.innerHTML = scanHistory.map((item, index) => `
                <div class="history-item" onclick="document.getElementById('domainInput').value='${item.domain}'; scanDomain();">
                    <span>${item.domain}</span>
                    <span style="color: #6c7086; font-size: 0.8rem;">${new Date(item.timestamp).toLocaleString()}</span>
                </div>
            `).join('') || '<div style="color: #6c7086; padding: 10px;">История пуста</div>';
        }

        // Инициализация при загрузке
        document.addEventListener('DOMContentLoaded', () => {
            renderHistory();
            
            // Добавляем кнопку экспорта
            const footer = document.querySelector('footer');
            const exportBtn = document.createElement('button');
            exportBtn.textContent = '📥 Экспорт результатов';
            exportBtn.style.cssText = 'margin-top: 10px; background: var(--card); color: var(--accent); border: 1px solid var(--accent);';
            exportBtn.onclick = exportResults;
            footer.appendChild(exportBtn);
            
            // Добавляем секцию истории
            const container = document.querySelector('.container');
            const historySection = document.createElement('div');
            historySection.className = 'card';
            historySection.style.marginTop = '20px';
            historySection.innerHTML = `
                <h2><span class="icon">📜</span> История сканирований</h2>
                <div id="historyList" class="subdomain-list"></div>
            `;
            container.appendChild(historySection);
            renderHistory();
        });
    </script>
</body>
</html>
